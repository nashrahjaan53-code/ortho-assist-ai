name: Build Flet App
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow requests

      - name: Build APK
        run: |
          flet build apk mobile/ --verbose --no-rich-output --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orthoassist-apk
          path: build/apk/*.apk

  build_ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pillow requests

      # We compile as an unsigned ios-simulator build so it succeeds in GitHub Actions
      # without needing Apple Developer Program subscription credentials/certificates.
      - name: Build iOS Simulator App
        run: |
          flet build ios-simulator mobile/ --verbose --no-rich-output --yes

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: orthoassist-ios-simulator
          path: build/ios-simulator/*.app
